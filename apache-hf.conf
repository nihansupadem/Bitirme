<VirtualHost *:7860>
    DocumentRoot /var/www/html/frontend

    # PHP site root
    <Directory /var/www/html/frontend>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    # Parent directory — allow Apache to traverse but block direct browsing
    <Directory /var/www/html>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    # Block direct access to sensitive files outside frontend/
    <FilesMatch "\.(db|py|csv|meta)$">
        Require all denied
    </FilesMatch>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
